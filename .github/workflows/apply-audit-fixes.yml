name: Apply blueYosys audit fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.head_ref == 'agent/initialize-blueyosys' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and validate final audit fixes
        run: bash scripts/apply_final_audit_fixes.sh

      - name: Commit validated tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No audit fixes were produced."
            exit 0
          fi
          git commit -m "Fix host runtime and strengthen repository validation"
          git push origin HEAD:${{ github.head_ref }}
