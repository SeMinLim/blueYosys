name: One-time non-main branch pruning

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/prune-non-main-branches.yml

permissions:
  contents: write

jobs:
  prune:
    if: github.event.head_commit.message == 'Verify and prune non-main branches'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Delete every remote branch except main
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t branches < <(
            git ls-remote --heads origin |
              awk '{ sub("refs/heads/", "", $2); print $2 }'
          )

          printf 'Remote branches before pruning:\n'
          printf '  %s\n' "${branches[@]}"

          failure=0
          for branch in "${branches[@]}"; do
            if [[ "${branch}" == "main" ]]; then
              continue
            fi

            echo "Deleting remote branch: ${branch}"
            if ! git push origin --delete "${branch}"; then
              echo "Failed to delete branch: ${branch}" >&2
              failure=1
            fi
          done

          mapfile -t remaining < <(
            git ls-remote --heads origin |
              awk '{ sub("refs/heads/", "", $2); print $2 }'
          )

          printf 'Remote branches after pruning:\n'
          printf '  %s\n' "${remaining[@]}"

          if (( failure != 0 )); then
            exit 1
          fi

          if [[ "${#remaining[@]}" -ne 1 || "${remaining[0]}" != "main" ]]; then
            echo "Branch pruning verification failed." >&2
            exit 1
          fi

          cat > .github/branch-prune-success.txt <<'EOF'
          Branch pruning completed successfully.
          Remaining remote branch: main
          EOF

      - name: Record successful verification
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/branch-prune-success.txt
          git commit -m "Record successful branch pruning [skip ci]"
          git push origin HEAD:main
