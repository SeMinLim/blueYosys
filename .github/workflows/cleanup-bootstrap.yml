name: One-time bootstrap cleanup

"on":
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blueyosys-bootstrap-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Clean migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/initialize-blueyosys
          fetch-depth: 0

      - name: Remove one-time bootstrap artifacts and revalidate
        run: |
          rm -f .github/workflows/bootstrap.yml
          rm -f scripts/bootstrap_payload.b64.part*
          rm -f scripts/bootstrap_from_ulx3s.sh
          rm -f scripts/bootstrap_from_ulx3s.full.sh
          cat > docs/upstream-source.txt <<'EOF'
          blueYosys was imported from:
            https://github.com/SeMinLim/ulx3s_bsv

          Branch:
            master

          Snapshot commit:
            a3652e203c2a4f78bc54bdbecd1eedc804d4eab4

          The migration was performed by a one-time validated GitHub Actions workflow.
          Project non-Makefile contents are recorded in:
            docs/upstream-project-files.sha256
          EOF
          make lint

      - name: Commit cleaned migration branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Remove one-time bootstrap artifacts [skip ci]"
          git push origin HEAD:agent/initialize-blueyosys

      - name: Remove this workflow from main
        run: |
          git fetch origin main
          git switch --force-create main origin/main
          git rm .github/workflows/cleanup-bootstrap.yml
          git commit -m "Remove one-time bootstrap cleanup workflow [skip ci]"
          git push origin HEAD:main
