name: Bootstrap blueYosys

on:
  push:
    branches:
      - agent/initialize-blueyosys
    paths:
      - .github/workflows/bootstrap.yml
      - scripts/bootstrap_from_ulx3s.sh

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: agent/initialize-blueyosys
          fetch-depth: 0

      - name: Import and reorganize ulx3s_bsv
        run: bash scripts/bootstrap_from_ulx3s.sh

      - name: Validate migrated repository
        run: make lint

      - name: Commit migrated tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No migration changes were produced."
            exit 0
          fi
          git commit -m "Initialize multi-board blueYosys hierarchy [skip ci]"
          git push origin HEAD:agent/initialize-blueyosys
